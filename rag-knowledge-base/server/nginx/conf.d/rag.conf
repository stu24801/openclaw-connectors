# ── HTTP: ACME challenge + redirect to HTTPS ──────────────────────────────────
server {
    listen 80;
    server_name rag.alex-stu24801.com;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: reverse proxy to FastAPI ──────────────────────────────────────────
server {
    listen 443 ssl;
    server_name rag.alex-stu24801.com;

    ssl_certificate     /etc/letsencrypt/live/rag.alex-stu24801.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rag.alex-stu24801.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    client_max_body_size 50M;   # max upload size

    location / {
        proxy_pass         http://rag:8765;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
